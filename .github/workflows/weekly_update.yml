name: Weekly LIG paper monitor

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent 1 (fetch new papers)
        run: python scripts/fetch_papers.py
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

      - name: Run agent 2 (classify + build report)
        run: python scripts/analyze_papers.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "lig-monitor-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Weekly LIG data update ($(date +'%Y-%m-%d'))"
          git push

      - name: Copy data into site folder for Pages
        run: cp -r data site/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: collect-and-analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
